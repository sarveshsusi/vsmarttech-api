name: CI

on:
  push:
    branches: [main, master, develop, "feature/**", "improve/**"]
  pull_request:

jobs:
  backend:
    name: Backend build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Pin a patched toolchain (go.mod is 1.25.12+); avoids stdlib vulns on bare 1.25.0
          go-version: "1.25.12"
          cache-dependency-path: backend/go.sum

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Integration tests
        env:
          INTEGRATION_DATABASE_URL: postgres://test:test@localhost:5432/vsmart_test?sslmode=disable
        run: go test -tags=integration -count=1 -timeout 10m ./service/

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Build API
        run: CGO_ENABLED=0 go build -o /tmp/api ./cmd/api

      - name: Build workers
        run: |
          CGO_ENABLED=0 go build -o /tmp/worker-sla ./cmd/worker-sla
          CGO_ENABLED=0 go build -o /tmp/worker-contracts ./cmd/worker-contracts

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: vsmart_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d vsmart_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
