openapi: 3.0.3
info:
  title: VSmart Tech API
  version: 1.0.0
  description: Modular monolith CRM API. Public entry via Nginx; workers are not HTTP.
servers:
  - url: http://localhost:8081
    description: Docker Compose (Nginx)
paths:
  /healthz:
    get:
      summary: Liveness
      responses:
        "200":
          description: OK
  /readyz:
    get:
      summary: Readiness (DB ping)
      responses:
        "200":
          description: Ready
        "503":
          description: Not ready
  /api/v1/auth/login:
    post:
      summary: Login (may return two_fa_required)
      tags: [auth]
      responses:
        "200":
          description: Tokens or 2FA challenge
  /api/v1/auth/refresh:
    post:
      summary: Refresh access token (cookie or body)
      tags: [auth]
      responses:
        "200":
          description: New access token
  /api/v1/profile:
    get:
      summary: Current user profile
      tags: [auth]
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Profile
  /api/v1/admin/tickets:
    get:
      summary: Admin list tickets
      tags: [tickets]
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Ticket list
  /api/v1/support/tickets:
    get:
      summary: Support engineer tickets
      tags: [tickets]
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Ticket list
  /api/v1/support/tickets/visits:
    get:
      summary: List field visits for an assigned ticket
      tags: [tickets]
      security: [{bearerAuth: []}]
      parameters:
        - in: query
          name: ticket_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Field visit list
    post:
      summary: Log a field visit on an assigned In Progress ticket
      tags: [tickets]
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ticket_id, visit_date, notes]
              properties:
                ticket_id: { type: string }
                visit_date: { type: string, format: date }
                notes: { type: string }
                co_engineer_ids:
                  type: array
                  items: { type: string, format: uuid }
                proof_urls:
                  type: array
                  items: { type: string }
      responses:
        "201":
          description: Visit created
  /api/v1/admin/tickets/visits:
    get:
      summary: Admin read-only field visits for a ticket
      tags: [tickets]
      security: [{bearerAuth: []}]
      parameters:
        - in: query
          name: ticket_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Field visit list
  /api/v1/customer/tickets:
    get:
      summary: Customer tickets
      tags: [tickets]
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Ticket list
  /api/v1/notifications:
    get:
      summary: List notifications
      tags: [notify]
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Notifications
  /api/v1/admin/amc-assignments:
    get:
      summary: List AMC assignments
      tags: [amc]
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: AMC list
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
tags:
  - name: auth
  - name: tickets
  - name: amc
  - name: notify
  - name: crm
