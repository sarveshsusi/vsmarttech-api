# x-logging is reused by every service (prevents Docker logs filling the disk)
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

# Shared security defaults for app containers
x-app-security: &app-security
  security_opt:
    - no-new-privileges:true
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777

services:

  # ================================
  # HTTP API (modular monolith)
  # ================================
  api:
    build: .
    image: vsmart-backend:latest
    container_name: vsmart-api
    restart: unless-stopped
    <<: *app-security
    command: ["./api"]
    env_file:
      - .env
    environment:
      RUN_INPROCESS_CRONS: "false"
      TRUSTED_PROXIES: "nginx,172.16.0.0/12,10.0.0.0/8"
      # Tight pool for 1 GB Lightsail (api + 2 workers share Postgres)
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-8}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-2}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    mem_limit: 256m
    cpus: 0.50
    logging: *default-logging
    # No host ports — Nginx (and optional Caddy) proxy traffic

  # ================================
  # Background workers
  # ================================
  worker-sla:
    build: .
    image: vsmart-backend:latest
    container_name: vsmart-worker-sla
    restart: unless-stopped
    <<: *app-security
    command: ["./worker-sla"]
    env_file:
      - .env
    environment:
      RUN_INPROCESS_CRONS: "false"
      APP_ENV: ${APP_ENV:-production}
      DB_MAX_OPEN_CONNS: ${WORKER_DB_MAX_OPEN_CONNS:-3}
      DB_MAX_IDLE_CONNS: ${WORKER_DB_MAX_IDLE_CONNS:-1}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        # Wait for API migrate + healthy so schema exists before workers query
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s
    mem_limit: 128m
    cpus: 0.25
    logging: *default-logging

  worker-contracts:
    build: .
    image: vsmart-backend:latest
    container_name: vsmart-worker-contracts
    restart: unless-stopped
    <<: *app-security
    command: ["./worker-contracts"]
    env_file:
      - .env
    environment:
      RUN_INPROCESS_CRONS: "false"
      APP_ENV: ${APP_ENV:-production}
      DB_MAX_OPEN_CONNS: ${WORKER_DB_MAX_OPEN_CONNS:-3}
      DB_MAX_IDLE_CONNS: ${WORKER_DB_MAX_IDLE_CONNS:-1}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s
    mem_limit: 128m
    cpus: 0.25
    logging: *default-logging

  # ================================
  # PostgreSQL — NEVER publish 5432 to the internet
  # ================================
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Tuned for ~1 GB Lightsail host
    command:
      - postgres
      - -c
      - max_connections=40
      - -c
      - shared_buffers=128MB
      - -c
      - work_mem=4MB
      - -c
      - effective_cache_size=256MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - wal_buffers=4MB
      - -c
      - checkpoint_completion_target=0.9
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 320m
    cpus: 0.50
    networks:
      - internal
    logging: *default-logging

  # ================================
  # Nginx reverse proxy
  # ================================
  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      # Bound on host 8081. Lock this down with Lightsail firewall + UFW.
      # With Caddy: reverse_proxy 127.0.0.1:8081 and do NOT open 8081 publicly.
      - "8081:80"
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 64m
    cpus: 0.15
    logging: *default-logging

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
