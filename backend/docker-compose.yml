# x-logging is reused by every service (prevents Docker logs filling the disk)
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:

  # ================================
  # HTTP API (modular monolith)
  # ================================
  api:
    build: .
    container_name: vsmart-api
    restart: unless-stopped
    command: ["./api"]
    env_file:
      - .env
    environment:
      RUN_INPROCESS_CRONS: "false"
      TRUSTED_PROXIES: "nginx,172.16.0.0/12,10.0.0.0/8"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging: *default-logging
    # No host ports — Nginx (and optional Caddy) proxy traffic

  # ================================
  # Background workers
  # ================================
  worker-sla:
    build: .
    container_name: vsmart-worker-sla
    restart: unless-stopped
    command: ["./worker-sla"]
    env_file:
      - .env
    environment:
      RUN_INPROCESS_CRONS: "false"
      APP_ENV: ${APP_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - internal
    logging: *default-logging

  worker-contracts:
    build: .
    container_name: vsmart-worker-contracts
    restart: unless-stopped
    command: ["./worker-contracts"]
    env_file:
      - .env
    environment:
      RUN_INPROCESS_CRONS: "false"
      APP_ENV: ${APP_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - internal
    logging: *default-logging

  # ================================
  # PostgreSQL — NEVER publish 5432 to the internet
  # ================================
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    logging: *default-logging

  # ================================
  # Nginx reverse proxy
  # ================================
  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      # Bound on host 8081. Lock this down with Lightsail firewall + UFW.
      # With Caddy: reverse_proxy 127.0.0.1:8081 and do NOT open 8081 publicly.
      - "8081:80"
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
    logging: *default-logging

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
