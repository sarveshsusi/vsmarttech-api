version: "3.9"

services:

  # ================================
  # HTTP API (modular monolith)
  # ================================
  api:
    build: .
    container_name: vsmart-api
    restart: always
    command: ["./api"]
    env_file:
      - .env
    environment:
      # Workers own cron jobs in this Compose stack
      RUN_INPROCESS_CRONS: "false"
      TRUSTED_PROXIES: "nginx,172.16.0.0/12,10.0.0.0/8"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    # No direct port exposure — nginx proxies all traffic

  # ================================
  # Background workers (same image, different CMD)
  # ================================
  worker-sla:
    build: .
    container_name: vsmart-worker-sla
    restart: always
    command: ["./worker-sla"]
    env_file:
      - .env
    environment:
      RUN_INPROCESS_CRONS: "false"
      APP_ENV: ${APP_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - internal

  worker-contracts:
    build: .
    container_name: vsmart-worker-contracts
    restart: always
    command: ["./worker-contracts"]
    env_file:
      - .env
    environment:
      RUN_INPROCESS_CRONS: "false"
      APP_ENV: ${APP_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - internal

  # ================================
  # PostgreSQL (single shared DB — do not split yet)
  # ================================
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    # IMPORTANT: Do NOT expose port 5432 publicly

  # ================================
  # Nginx reverse proxy / API gateway
  # ================================
  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    restart: always
    ports:
      - "8081:80"
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
