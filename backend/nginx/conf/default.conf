# API gateway: single public origin. Path blocks document future service extracts
# while currently proxying everything to the modular-monolith `api` service.
# Keep one Postgres; do not introduce DB-per-service until there is a hard need.

upstream api_upstream {
    server api:8080;
    keepalive 16;
}

# Future extracts (keep commented until a service actually exists):
# upstream auth_upstream { server auth:8080; }
# upstream tickets_upstream { server tickets:8080; }
# upstream amc_upstream { server amc:8080; }

server {
    listen 80;
    server_name _;

    server_tokens off;

    # Defaults for JSON API; upload location overrides below
    client_max_body_size 1m;
    client_body_timeout 30s;
    send_timeout 60s;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        application/json
        application/javascript
        text/plain
        text/css
        text/xml
        application/xml;

    # Security headers (Caddy can also set these when terminating TLS)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_read_timeout    60s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_buffering on;
    proxy_buffers 16 16k;
    proxy_busy_buffers_size 32k;

    # Health / readiness (Compose + load balancers)
    location = /healthz {
        proxy_pass         http://api_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /readyz {
        proxy_pass         http://api_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Multipart image uploads (aligned with IMAGE_MAX_SIZE_BYTES ~1MB + form overhead)
    location = /api/v1/upload/proof {
        client_max_body_size 2m;
        proxy_request_buffering off;
        proxy_pass         http://api_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Auth domain — route ready for auth-identity extract
    location /api/v1/auth/ {
        proxy_pass         http://api_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Ticket domain paths — route ready for tickets extract
    location ~ ^/api/v1/(admin|support|customer)/tickets {
        proxy_pass         http://api_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # AMC / contracts — route ready for amc-contracts extract
    location ~ ^/api/v1/(admin|support)/(amc-|contracts) {
        proxy_pass         http://api_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Notifications — route ready for notify extract
    location /api/v1/notifications {
        proxy_pass         http://api_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Default → modular monolith API (crm-core + shared)
    location / {
        proxy_pass         http://api_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
